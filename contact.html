<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Mi Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/styles.css">
    <!-- Iconos de redes sociales -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-md navbar-dark bg-primary sticky-top">
        <div class="container">
            <!-- Agrego logo -->
            <a class="navbar-brand fw-bold" href="index.html">
                <img src="assets/images/logo.png" alt="Logo" width="40" height="40" class="me-2"> Mi Blog
            </a>
            <!-- Agrego toggler y nav-items -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTop" aria-controls="navbarTop" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
        <div class="collapse navbar-collapse" id="navbarTop">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="about.html">Sobre mí</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="contact.html">Contacto</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Formulario de contacto -->
    <main class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <h1 class="mb-4">Contacto</h1>

                    <form id="contactForm" novalidate>
                        <!-- Campo nombre -->
                        <div class="mb-3">
                            <label for="name" class="form-label">Nombre *</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                            <div class="invalid-feedback">
                                Por favor ingresa tu nombre.
                            </div>
                        </div>

                        <!-- Campo email -->
                        <div class="mb-3">
                            <label for="email" class="form-label">Email *</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                            <div class="invalid-feedback">
                                Por favor ingresa un email válido.
                            </div>
                        </div>

                        <!-- Campo teléfono -->
                        <div class="mb-3">
                            <label for="phone" class="form-label">Teléfono</label>
                            <input type="tel" class="form-control" id="phone" name="phone">
                            <div class="invalid-feedback">
                                Por favor ingresa un número de teléfono válido.
                            </div>
                        </div>

                        <!-- Campo mensaje -->
                        <div class="mb-3">
                            <label for="message" class="form-label">Mensaje *</label>
                            <textarea class="form-control" id="message" name="message" rows="5" required minlength="10"></textarea>
                            <div class="invalid-feedback">
                                El mensaje debe tener al menos 10 caracteres.
                            </div>
                        </div>

                        <!-- Botón submit -->
                        <button type="submit" class="btn btn-primary btn-lg w-100">Enviar</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p>&copy; 2026 Mi Blog. Todos los derechos reservados.</p>
        </div>
        <!-- Agrego links a redes sociales -->
        <div class="d-flex justify-content-center gap-3 mt-3">
            <a href="https://www.facebook.com/UniversidadNacionalTDF.Antartida.IslasAtlanticoSur/" target="_blank" rel="noopener noreferrer" class="text-white fs-4" aria-label="Facebook">
                <i class="bi bi-facebook" aria-hidden="true"></i>
            </a>
            <a href="https://x.com/UNTDF" target="_blank" rel="noopener noreferrer" class="text-white fs-4" aria-label="Twitter">
                <i class="bi bi-twitter" aria-hidden="true"></i>
            </a>
            <a href="https://www.instagram.com/untdf_universidad" target="_blank" rel="noopener noreferrer" class="text-white fs-4" aria-label="Instagram">
                <i class="bi bi-instagram" aria-hidden="true"></i>
            </a>
            <a href="https://www.linkedin.com/company/untdf/?originalSubdomain=ar" target="_blank" rel="noopener noreferrer" class="text-white fs-4" aria-label="LinkedIn">
                <i class="bi bi-linkedin" aria-hidden="true"></i>
            </a>
        </div>
    </footer>

    <!-- Script: validación HTML5 + feedback visual -->
    <script>
        const form = document.getElementById('contactForm');
        form.addEventListener('submit', (e) => {
            if (!form.checkValidity()) {
                e.preventDefault();
                e.stopPropagation();
            }
            form.classList.add('was-validated');
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
